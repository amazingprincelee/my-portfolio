<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 700" width="400" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#112233"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c518;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f5c518;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#f5c518;stop-opacity:0"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="logoClip">
      <rect x="130" y="210" width="140" height="140" rx="32" ry="32"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="700" fill="url(#bg)"/>

  <!-- Subtle radial glow behind logo -->
  <ellipse cx="200" cy="280" rx="140" ry="100" fill="#1a3a5c" opacity="0.35"/>

  <!-- Logo shadow -->
  <rect x="134" y="218" width="132" height="132" rx="30" ry="30" fill="#000000" opacity="0.35"/>

  <!-- Logo image -->
  <image href="/img/pamprop/logo.png" x="130" y="210" width="140" height="140" clip-path="url(#logoClip)"/>

  <!-- Glow line separator -->
  <rect x="80" y="390" width="240" height="1" fill="url(#glowLine)"/>

  <!-- PamProperty wordmark -->
  <text x="200" y="435" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#f5c518" filter="url(#textGlow)" letter-spacing="1">PamProperty</text>

  <!-- Tagline dots -->
  <text x="200" y="468" font-family="Arial, Helvetica, sans-serif" font-size="12" text-anchor="middle" fill="#8aafc8" letter-spacing="3">PAM  ·  Property Acquisition &amp; Management</text>

  <!-- Bottom bar -->
  <rect x="160" y="640" width="80" height="4" rx="2" fill="#ffffff" opacity="0.15"/>
</svg>
